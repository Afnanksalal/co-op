services:
  - type: web
    name: co-op-license-backend
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: api/v1
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: LICENSE_KEY_PEPPER
        generateValue: true
      - key: LICENSE_OFFLINE_GRACE_DAYS
        value: "14"
      - key: CORS_ORIGINS
        sync: false
